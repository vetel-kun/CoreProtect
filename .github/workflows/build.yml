name: Build Dynmap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'
        
    - name: Build Spigot Version Only
      run: ./gradlew :spigot:shadowJar --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Dynmap-Jar
        path: "**/target/*.jar"
